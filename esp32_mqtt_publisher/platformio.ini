; PlatformIO project configuration
; --------------------------------
; Place this file at the project root.  The .ino sketch should live in src/
; (rename it to main.cpp or keep it as .ino - PlatformIO accepts both).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient @ ^2.8
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
